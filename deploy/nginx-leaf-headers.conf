# Security headers for leaf.gundem.tech — Phase 7 (security-hardening).
# =====================================================================
# This snippet is NOT applied automatically by scripts/deploy.sh (which only
# rsyncs dist/ and reloads nginx). Install it ONCE on the VPS:
#
#   1. scp / paste this file to e.g.  /etc/nginx/snippets/leaf-headers.conf
#   2. In the leaf.gundem.tech vhost, inside the `server { … }` (TLS/443) block:
#          include /etc/nginx/snippets/leaf-headers.conf;
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. curl -sI https://leaf.gundem.tech/ | grep -iE 'content-security|strict-transport|referrer|x-content-type|permissions-policy'
#      → expect all five headers.
#
# ⚠ nginx add_header inheritance footgun: if ANY `location { }` in this vhost
#   defines its own add_header, it DROPS all server-level add_header for that
#   location. Audit the existing location blocks (static, /api proxy, etc.) on
#   THIS vhost; re-`include` this snippet inside any location that sets headers.
#
# ── CSP rollout (master spec Open Q2) ───────────────────────────────────────
# Ships in REPORT-ONLY first. Load the site in a browser for ~48h and watch the
# console for "Content-Security-Policy" violation reports (this static site has
# no report collector — observation is manual + curl). When clean, flip to
# enforce: comment the -Report-Only line and uncomment the enforcing one below.
#
# script-src / style-src carry 'unsafe-inline' on purpose (OT-SEC-7c):
#   Astro inlines its island <script> blocks (5/page) into the HTML and the site
#   uses ~54 inline style="" attributes (e.g. the logo --logo-size custom prop).
#   Astro's native hash-CSP is incompatible with 'unsafe-inline' and cannot hash
#   inline style ATTRIBUTES, so a strict hashed policy would break the live site.
#   The remaining directives (frame-ancestors/object-src/base-uri/form-action/
#   connect-src host allowlist) still provide strong protection. Dropping
#   'unsafe-inline' later = move inline scripts/styles out + adopt Astro hash-CSP.

add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://jpzqmtmmypnzqhdltcvr.supabase.co; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

# After 48h clean, comment the line above and uncomment this enforcing one:
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://jpzqmtmmypnzqhdltcvr.supabase.co; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

# Host-scoped HSTS (NO includeSubDomains — not every *.gundem.tech subdomain has
# been audited for HTTPS-only; widen later after a subdomain audit).
add_header Strict-Transport-Security "max-age=31536000" always;

add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
